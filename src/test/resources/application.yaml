spring:
  application:
    name: gitotg
  datasource:
    url: jdbc:h2:mem:gitotgdb;CACHE_SIZE=2048;QUERY_CACHE_SIZE=4
    username: sa
    password: password
    driverClassName: org.h2.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:test-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID:test-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:test-github-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: read:user, user:email
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

logging:
  level:
    root: WARN
    com:
      mirkoebert: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n"

features:
  load-dummy-data: true

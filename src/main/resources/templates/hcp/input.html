<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Gitotg: Handicap</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:insert="~{fragments/head :: favicons}"></th:block>
    <style>
        .hero {
            background-color: #f8f9fa;
            padding: 5rem 0;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
</head>
<body class="container mt-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>

<h1 class="text-center mb-4">Handicap</h1>
<ul class="list-group">
    <li class="list-group-item">HCP: <span th:text="${lastResult.hcp}"></span></li>
    <li class="list-group-item">Date: <span th:text="${lastResult.date}"></span></li>
    <li class="list-group-item">Trend: <span th:text="${lastResult.trend}"></span></li>
    <li class="list-group-item">Export: <a href="/api/handicap/export">CSV</a> </li>
    <li class="list-group-item">
        Import:
        <form id="hcp-import-form" method="post" th:action="@{/api/handicap/import}" enctype="multipart/form-data" style="display:inline;">
            <input type="file" name="file" accept=".csv" required style="max-width:200px;">
            <button type="submit" class="btn btn-sm btn-secondary">Upload</button>
        </form>
        <small>(CSV with date,hcp columns; appends data; max 1MB)</small>
        <div id="hcp-import-status" style="display:none; margin-top:4px; font-size:0.9em;"></div>
    </li>
</ul>


<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <canvas height="200" id="lineChart" width="500"></canvas>
        </div>
    </div>
</div>

<script>
    // Fetch data from REST API and render chart
    fetch('[[@{/api/handicap/chart-data}]]')
        .then(response => response.json())
        .then(data => {
            const ctx = document.getElementById('lineChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'HCP',
                        data: data.hcp,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        tension: 0.5,
                        fill: false,
                        connectNulls: true,
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: 'Handicap Monthly' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        })
        .catch(error => console.error('Error fetching data:', error));
</script>
<div class="container my-5">
    <h2>Add Handicap</h2>
    <form method="post" th:action="@{/handicap/submit}" th:object="${hcpScore}">
        <div class="row g-3 align-items-end">
            <div class="col-md-4" th:classappend="${#fields.hasErrors('hcp')} ? 'is-invalid'">
                <label class="form-label" for="hcp">Handicap</label>
                <input class="form-control" id="hcp" th:field="*{hcp}" type="number" step="0.1" placeholder="e.g. 18.4" required>
                <div class="text-danger small" th:errors="*{hcp}"></div>
            </div>
            <div class="col-md-4" th:classappend="${#fields.hasErrors('selectedDate')} ? 'is-invalid'">
                <label class="form-label" for="selectedDate">Date</label>
                <input class="form-control" id="selectedDate" th:field="*{selectedDate}" type="date" required>
                <div class="text-danger small" th:errors="*{selectedDate}"></div>
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary" type="submit">Add Score</button>
            </div>
        </div>
    </form>
</div>

<script>
(function() {
  const form = document.getElementById('hcp-import-form');
  const statusEl = document.getElementById('hcp-import-status');
  if (!form || !statusEl) return;

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = form.querySelector('button[type="submit"]');
    const originalText = btn ? btn.textContent : '';
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Uploading...';
    }
    statusEl.style.display = 'none';
    statusEl.innerHTML = '';

    try {
      const formData = new FormData(form);
      const response = await fetch(form.action, {
        method: 'POST',
        body: formData
      });
      const text = await response.text();
      if (response.ok) {
        statusEl.innerHTML = '<span class="text-success">' + text + '</span>';
        setTimeout(function() { window.location.reload(); }, 1200);
      } else {
        statusEl.innerHTML = '<span class="text-danger">Error: ' + text + '</span>';
      }
    } catch (err) {
      statusEl.innerHTML = '<span class="text-danger">Upload failed: ' + (err.message || err) + '</span>';
    } finally {
      statusEl.style.display = 'block';
      if (btn) {
        btn.disabled = false;
        btn.textContent = originalText;
      }
      const fileInput = form.querySelector('input[type="file"]');
      if (fileInput) fileInput.value = '';
    }
  });
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Gitotg: Handicap</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        .hero {
            background-color: #f8f9fa;
            padding: 5rem 0;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="container mt-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>

<h1 class="text-center mb-4">Handicap</h1>
<ul class="list-group">
    <li class="list-group-item">HCP: <span th:text="${lastResult.hcp}"></span></li>
    <li class="list-group-item">Date: <span th:text="${lastResult.date}"></span></li>
    <li class="list-group-item">Trend: <span th:text="${lastResult.trend}"></span></li>
    <li class="list-group-item">Export: <a href="/api/handicap/export">CSV</a> </li>
</ul>


<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <canvas height="200" id="lineChart" width="500"></canvas>
        </div>
    </div>
</div>

<div class="container my-5">
    <h2>Add Handicap</h2>
    <form method="post" th:action="@{/handicap/submit}" th:object="${hcpScore}">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label" for="hcp">Handicap</label>
                <input class="form-control" id="hcp" th:field="*{hcp}" type="number" step="0.1" placeholder="e.g. 18.4" required>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="selectedDate">Date</label>
                <input class="form-control" id="selectedDate" th:field="*{selectedDate}" type="date" required>
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary" type="submit">Add Score</button>
            </div>
        </div>
    </form>
</div>

<!-- Chart.js for handicap trend -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"
        defer></script>
<script>
    // Fetch data from REST API and render chart
    fetch('[[@{/api/handicap/chart-data}]]')
        .then(response => response.json())
        .then(data => {
            const ctx = document.getElementById('lineChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'HCP',
                        data: data.hcp,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        tension: 0.5,
                        fill: false,
                        connectNulls: true,
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: 'Handicap Monthly' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        })
        .catch(error => console.error('Error fetching data:', error));
</script>

<!-- Common scripts (Bootstrap) -->
<div th:insert="~{fragments/scripts :: scripts}"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Gitotg: Get it on the Green</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .timeline {
            position: relative;
            padding: 20px 0;
        }
        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #007bff;
            left: 50%;
            margin-left: -2px;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 30px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #007bff;
            border: 2px solid #fff;
            left: 50%;
            margin-left: -8px;
            z-index: 1;
        }
        .timeline-content {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            position: relative;
        }
        .timeline-item:nth-child(odd) .timeline-content {
            margin-right: 10%;
            margin-left: 5%;
        }
        .timeline-item:nth-child(even) .timeline-content {
            margin-left: 10%;
            margin-right: 5%;
        }
        @media (max-width: 767.98px) {
            .timeline::before {
                left: 20px;
            }
            .timeline-item::before {
                left: 20px;
                margin-left: -8px;
            }
            .timeline-item:nth-child(odd) .timeline-content,
            .timeline-item:nth-child(even) .timeline-content {
                margin-left: 40px;
                margin-right: 20px;
            }
        }
    </style>
</head>
<body class="container mt-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>

<h2 class="text-center mb-4">Timeline</h2>
<div class="timeline">
    <tr th:each="m: ${timeline}">
        <div class="timeline-item">
            <div class="timeline-content">
                <h5 th:text="${#temporals.format(m.date, 'dd. MMMM yyyy')}"></h5>
                <p><span th:text="${m.comment}"></span>: <span th:text="${m.type}"></span> <span
                        th:text="${m.value}"></span></p>
            </div>
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

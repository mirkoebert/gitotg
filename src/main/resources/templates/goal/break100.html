<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'Gitotg: Goal ' + ${goalTitle}">Gitotg: Goal</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:insert="~{fragments/head :: favicons}"></th:block>
</head>
<body class="container mt-3 mt-md-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>

<h1 class="text-center mb-4" th:text="${goalTitle}">Goal</h1>

<div th:if="${saved}" class="alert alert-success" role="alert">
    Checklist saved.
</div>

<div class="mb-4" th:if="${progress != null and !progress.empty}">
    <div class="d-flex justify-content-between align-items-baseline mb-1">
        <span class="fw-bold">Progress</span>
        <span class="text-muted"
              th:text="${progress.checkedCount} + ' of ' + ${progress.totalCount} + ' (' + ${progress.percentage} + '%)'">
            0 of 0 (0%)
        </span>
    </div>
    <div class="progress" role="progressbar"
         th:attr="aria-valuenow=${progress.percentage}, aria-valuemin=0, aria-valuemax=100"
         th:aria-label="'Checklist progress ' + ${progress.percentage} + ' percent'">
        <div class="progress-bar"
             th:classappend="${progress.percentage == 100} ? 'bg-success'"
             th:style="'width: ' + ${progress.percentage} + '%'"
             th:text="${progress.percentage} + '%'">0%</div>
    </div>
</div>

<form th:action="@{/goal/{slug}/save(slug=${goalSlug})}" th:object="${myForm}" method="post">

    <div class="mb-3">
        <label class="form-label fw-bold">Checklist</label>

        <div th:each="option : ${allOptions}" class="mb-2">
            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{selectedOptions}"
                       th:value="${option.id}"
                       th:id="'option-' + ${option.id}" />
                <label class="form-check-label"
                       th:for="'option-' + ${option.id}"
                       th:text="${option.name}">Option</label>
            </div>
            <div class="form-text ms-4"
                 th:if="${option.description != null and !option.description.isEmpty()}"
                 th:text="${option.description}">Description</div>
        </div>
        <p th:if="${#lists.isEmpty(allOptions)}" class="text-muted">No checklist items for this goal yet.</p>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

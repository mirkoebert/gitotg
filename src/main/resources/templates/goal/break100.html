<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Gitotg: Goal Break 100</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        .dropdown-submenu {
          position: relative;
        }
        .dropdown-submenu .dropdown-menu {
          top: 0;
          left: 100%;
          margin-top: -1px;
          display: none; /* Hidden by default */
        }
        .dropdown-submenu:hover > .dropdown-menu {
          display: block;
        }
        /* For touch devices: make it clickable */
        @media (max-width: 992px) {
          .dropdown-submenu .dropdown-menu {
            position: static;
            left: auto;
            float: none;
          }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
            integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
            crossorigin="anonymous"
            defer></script>
</head>
<body class="container mt-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>

<h1 class="text-center mb-4">Break 100?</h1>
<form th:action="@{/goal/break100/save}" th:object="${myForm}" method="post">

    <div class="mb-3">
        <label class="form-label fw-bold">Checklist</label>

        <div th:each="option : ${allOptions}">
            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{selectedOptions}"
                       th:value="${option.id}"
                       th:id="'option-' + ${option.id}" />
                <label class="form-check-label"

                       th:text="${option.name}">Option</label>
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<div th:insert="~{fragments/scripts :: scripts}"></div>

</body>
</html>

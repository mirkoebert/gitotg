<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Short Game Input</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="container mt-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>


<h1 class="text-center mb-4"><span th:text="${sgitest.name}"></span></h1>

<ul class="list-group">
    <li class="list-group-item">Distance: <span th:text="${sgitest.distanceMeterToCup}"></span>m</li>
    <li class="list-group-item">Shots: 10</li>
    <li class="list-group-item">Holed: 4 Points</li>
    <li class="list-group-item">In 1m: 2 Points</li>
    <li class="list-group-item">In 2m: 1 Point</li>
    <li class="list-group-item">
        <form class="row gy-1 gx-3 align-items-center" method="post" th:action="@{/submit}"
              th:object="${sgitest1score}">
            <input th:field="*{type}" type="hidden"/>
            <input th:field="*{testId}" type="hidden"/>

            <div class="col-auto">
                <label class="col-form-label" for="points">Points:</label>
            </div>
            <div class="col-auto">
                <input class="form-control" id="points" th:field="*{points}" type="number"/>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary" type="submit">Submit</button>
            </div>
        </form>
    </li>
    <li class="list-group-item">Trend:      <span th:text="${trend}"></span></li>

</ul>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <canvas height="200" id="lineChart" width="450"></canvas>
        </div>
    </div>
</div>

<script>
    // Fetch data from REST API and render chart
    fetch('[[@{/api/sgi/chart-data/{id}(id=${testId})}]]')
        .then(response => response.json())
        .then(data => {
            const ctx = document.getElementById('lineChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'HCP',
                        data: data.hcp,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        tension: 0.5,
                        fill: false,
                        connectNulls: true,
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: 'HCP Monthly' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        })
        .catch(error => console.error('Error fetching data:', error));
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>SGI Result</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="container mt-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>

<h1 class="text-center mb-4"><span th:text="${lastResult.testType}"></span> <span th:text="${lastResult.testId}"></span>
    Result</h1>
<ul class="list-group">
    <li class="list-group-item">Points:     <span th:text="${lastResult.points}"></span></li>
    <li class="list-group-item">Date:       <span th:text="${lastResult.date}"></span></li>
    <li class="list-group-item">HCP:        <span th:text="${lastResult.hcp}"></span></li>
    <li class="list-group-item">Trend:      <span th:text="${trend}"></span></li>
</ul>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <canvas height="200" id="lineChart" width="450"></canvas>
        </div>
    </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"
        defer></script>
<script>
    // Fetch data from REST API and render chart
    fetch('[[@{/api/sgi/chart-data/{id}(id=${lastResult.testId})}]]')
        .then(response => response.json())
        .then(data => {
            const ctx = document.getElementById('lineChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'HCP',
                        data: data.hcp,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        tension: 0.5,
                        fill: false,
                        connectNulls: true,
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: 'HCP Monthly' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        })
        .catch(error => console.error('Error fetching data:', error));
</script>

<!-- Common scripts (Bootstrap) -->
<div th:insert="~{fragments/scripts :: scripts}"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>User details</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:insert="~{fragments/head :: favicons}"></th:block>
    <style>
        .user-avatar {
            max-width: min(160px, 40vw);
            height: auto;
        }
    </style>
</head>
<body class="container mt-3 mt-md-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>


<h1 class="text-center mb-4">Gitotg: User details</h1>
<ol class="list-group">
    <li class="list-group-item" th:if="${picture != null}">
        <img alt="user avatar" class="user-avatar img-fluid rounded" th:src="${picture}">
    </li>
    <li class="list-group-item" th:unless="${picture != null}">
        (no profile picture)
    </li>
    <li class="list-group-item">Name:           <span th:text="${name}"></span></li>
    <li class="list-group-item">Email:          <span th:text="${email}"></span></li>
    <li class="list-group-item">HCP:            <span th:text="${lastHCP}"></span></li>
    <li class="list-group-item">Short Game HCP: <span th:text="${lastSGHCP}"></span></li>
    <li class="list-group-item">Break 100 checklist: <span th:text="${break100Progress}"></span>%</li>
    <li class="list-group-item">Break 90 checklist:  <span th:text="${break90Progress}"></span>%</li>
    <li class="list-group-item">Break 80 checklist:  <span th:text="${break80Progress}"></span>%</li>
    <li class="list-group-item"><span class="fw-bold" th:text="${advice}"></span></li>
</ol>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>User details</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="container mt-5">
<div th:insert="~{fragments/navbar :: navbar}"></div>


<h1 class="text-center mb-4">Gitotg: User details</h1>
<ol class="list-group">
    <li class="list-group-item"><img alt="user avatar" class="img-fluid rounded" th:src="@{${picture}}"></li>
    <li class="list-group-item">Name:           <span th:text="${name}"></span></li>
    <li class="list-group-item">Email:          <span th:text="${email}"></span></li>
    <li class="list-group-item">HCP:            <span th:text="${lastHCP}"></span></li>
    <li class="list-group-item">Short Game HCP: <span th:text="${lastSGHCP}"></span></li>
    <li class="list-group-item"><span th:text="${advice}"></span></li>
</ol>
<div th:insert="~{fragments/scripts :: scripts}"></div>
</body>
</html>

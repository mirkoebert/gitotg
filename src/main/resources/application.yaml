server:
  port: 80
  tomcat:
    # Personal app: keep platform threads low (default stack ~1MB each unless -Xss is set)
    threads:
      max: 10
      min-spare: 1
    max-connections: 25
    accept-count: 10
    max-http-form-post-size: 1MB
    mbeanregistry:
      enabled: false
app:
  version: @project.version@
spring:
  application:
    name: gitotg
  jmx:
    enabled: false
  main:
    # Defer non-web beans until first use (lower idle RSS; first request slightly slower)
    lazy-initialization: true
    banner-mode: "off"
  datasource:
    # CACHE_SIZE is KB of H2 page cache (default ~16MB)
    url: jdbc:h2:file:./db/gitotgdb;CACHE_SIZE=2048;QUERY_CACHE_SIZE=4
    username: sa
    password: password
    driverClassName: org.h2.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 120000
      max-lifetime: 600000
      pool-name: gitotg-pool
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 15
        order_inserts: true
        order_updates: true
        # Avoid extra metadata / stats work at runtime
        generate_statistics: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: read:user, user:email
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
  thymeleaf:
    cache: true

logging:
  level:
    root: INFO
    com:
      mirkoebert: INFO
    org.hibernate: WARN
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n"
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/${spring.application.name}-%d{yyyy-MM-dd}.%i.log
      max-file-size: 2MB
      total-size-cap: 50MB
      clean-history-on-start: true

features:
  load-dummy-data: false
